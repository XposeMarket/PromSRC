<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Landing Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      max-width: 720px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      border: 1px solid #334155;
      border-radius: 999px;
      color: #cbd5e1;
      font-size: 14px;
    }

    h1 {
      font-size: clamp(40px, 8vw, 72px);
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: -0.05em;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      position: relative;
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 10px;
      font-weight: bold;
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: 0;
      left: 0;
      pointer-events: none;
      animation: fall 900ms ease-out forwards;
      z-index: 999;
    }

    @keyframes fall {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) rotate(720deg);
      }
    }

    .primary {
      background: #ffffff;
      color: #0f172a;
    }

    .secondary {
      border: 1px solid #475569;
      color: #ffffff;
    }

    .footer {
      margin-top: 48px;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="badge">Launching Soon</div>
    <h1>Build something people remember.</h1>
    <p>
      A clean, simple landing page for your product, service, or idea.
      Replace this copy with your message and start collecting attention.
    </p>
    <div class="buttons">
      <a class="primary" href="#">Get Started</a>
      <a class="secondary" href="#">Learn More</a>
    </div>
    <div class="footer">© 2026 Your Brand. All rights reserved.</div>
  </main>
  <script>
    const colors = ['#f43f5e', '#f59e0b', '#22c55e', '#38bdf8', '#a78bfa', '#ffffff'];

    function dropConfetti(event) {
      event.preventDefault();
      const button = event.currentTarget;
      const rect = button.getBoundingClientRect();
      const startX = rect.left + rect.width / 2;
      const startY = rect.top + rect.height / 2;

      for (let i = 0; i < 34; i++) {
        const piece = document.createElement('span');
        piece.className = 'confetti';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.left = `${startX}px`;
        piece.style.top = `${startY}px`;
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.setProperty('--x', `${(Math.random() - 0.5) * 320}px`);
        piece.style.setProperty('--y', `${120 + Math.random() * 220}px`);
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 900);
      }
    }

    document.querySelectorAll('.buttons a').forEach((button) => {
      button.addEventListener('click', dropConfetti);
    });
  </script>
</body>
</html>
