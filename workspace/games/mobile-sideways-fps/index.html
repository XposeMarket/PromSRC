<body>
<div id="app">

  <div id="hud"><div id="topbar"><div class="stack"><div class="row"><div class="pill danger" id="healthPill">❤ 125/125</div><div class="pill gold" id="pointsPill">$1200</div><div class="pill" id="wavePill">WAVE 1</div><div class="pill" id="mutePill">SOUND ON</div><div class="pill" id="pausePill">PAUSE</div></div><div class="row" id="perkRow"></div></div><div class="stack" style="align-items:flex-end"><div class="pill" id="weaponPill">M1911</div><div class="pill" id="ammoPill">10 / 90</div><div class="pill good" id="zombiePill">ZOMBIES 0</div></div></div><div id="prompt"></div><div id="crosshair"></div><div id="portraitHint">Rotate sideways for the best grip. Mobile controls are live.</div><div id="centerMessage"><h1>POCKET<br>ZOMBIES</h1><p>Asset-backed mobile raycast Zombies: real weapon sprites, zombie billboard sprites, wall buys, perks, doors, power-ups, and waves.</p><button id="startButton">START GAME</button></div></div>

</div>
<script>
(() => {
  'use strict';

  const MAP=['########################','#....g.......#.....p...#','#............#.........#','#..s..##..D..#..w......#','#......#.....#.........#','#..w...#.....D.....S...#','#......#.....#.........#','###D####.....####D######','#......#.....#.........#','#..j...D.....D...r.....#','#......#.....#.........#','#..S...#.....#.....S...#','#......#.....#.........#','#....p.#.....#..m......#','########################'];
  const H=MAP.length,W=MAP[0].length, baseMap=MAP.map(r=>[...r].map(ch=>ch==='#'?1:0));
  const weapons={pistol:{id:'pistol',name:'M1911',price:0,dmg:55,fireMs:235,mag:10,reserve:90,reloadMs:850,spread:.018,range:13,cell:4,color:'#ffe8a3'},smg:{id:'smg',name:'WALL SMG',price:950,dmg:23,fireMs:92,mag:32,reserve:160,reloadMs:1120,spread:.045,range:10.5,cell:5,color:'#95d9ff'},shotgun:{id:'shotgun',name:'TRENCH SHOTGUN',price:1250,dmg:25,pellets:8,fireMs:700,mag:6,reserve:48,reloadMs:1320,spread:.145,range:6.5,cell:6,color:'#ffca86'},rifle:{id:'rifle',name:'BATTLE RIFLE',price:1600,dmg:63,fireMs:205,mag:20,reserve:120,reloadMs:1220,spread:.021,range:14.5,cell:7,color:'#c6ff9d'}};
  const perkDefs={jug:{id:'jug',name:'JUG',price:1800,desc:'+75 health',color:'#ff6565',cell:8},speed:{id:'speed',name:'SPEED',price:1400,desc:'fast reload',color:'#74c7ff',cell:9},double:{id:'double',name:'DOUBLE',price:2000,desc:'+35% damage',color:'#ffcf4a',cell:10},stamin:{id:'stamin',name:'STAMIN',price:1200,desc:'fast move',color:'#63ff9f',cell:11}};
  const wallGuns=[{x:3.5,y:3.5,weapon:'smg'},{x:3.5,y:5.5,weapon:'shotgun'},{x:16.5,y:5.5,weapon:'rifle'}], perkMachines=[{x:4.5,y:9.5,perk:'jug'},{x:18.5,y:9.5,perk:'speed'},{x:5.5,y:13.5,perk:'double'},{x:18.5,y:1.5,perk:'stamin'}], doors=[{id:'d1',x:3,y:7,price:750,open:false},{id:'d2',x:10,y:3,price:1000,open:false},{id:'d3',x:13,y:5,price:1250,open:false},{id:'d4',x:15,y:7,price:1500,open:false},{id:'d5',x:7,y:9,price:1000,open:false},{id:'d6',x:13,y:9,price:1250,open:false}];
  const startSpawns=[{x:8.5,y:2.5},{x:9.5,y:1.5},{x:6.5,y:5.5},{x:1.5,y:6.5},{x:5.5,y:1.5}], allSpawns=[...startSpawns,{x:18.5,y:2.5},{x:2.5,y:12.5},{x:20.5,y:12.5},{x:10.5,y:13.5}];
  const sheet=new Image(); let sheetReady=false; sheet.onload=()=>{sheetReady=true}; sheet.onerror=()=>{sheetReady=false}; sheet.src='assets/pocket-zombies-sprites.png';
  const cut={z0:[0,0,256,256],z1:[256,0,256,256],z2:[512,0,256,256],z3:[768,0,256,256],pistol:[0,256,256,256],smg:[256,256,256,256],shotgun:[512,256,256,256],rifle:[768,256,256,256],jug:[0,512,256,256],speed:[256,512,256,256],double:[512,512,256,256],stamin:[768,512,256,256],max:[0,768,256,256],insta:[256,768,256,256],points:[512,768,256,256],nuke:[768,768,256,256]};
  const state={running:false,paused:false,gameOver:false,last:0,shake:0,player:{x:2.5,y:2.5,a:0,hp:125,maxHp:125,points:1200,kills:0,speed:2.75,alive:true},wave:1,waveState:'ready',waveTimer:0,zombiesToSpawn:0,spawnCooldown:0,zombies:[],floaters:[],powerups:[],particles:[],owned:['pistol'],current:'pistol',ammo:{pistol:{mag:10,reserve:90},smg:{mag:0,reserve:0},shotgun:{mag:0,reserve:0},rifle:{mag:0,reserve:0}},perks:new Set(),activePowers:{insta:0,double:0},reloading:false,reloadTimer:0,lastShot:0,lastHurt:0,prompt:null,audio:null,audioReady:false,audioGain:1,muted:false,audioMutedByUser:false};
  const keys=new Set(), touch={moveId:null,lookId:null,moveStart:null,move:{x:0,y:0},lookLast:null,firing:false};
  const tex={}; function makeTex(name,w,h,draw){const c=document.createElement('canvas');c.width=w;c.height=h;const g=c.getContext('2d');draw(g,w,h);tex[name]=c}
  function makeAssets(){makeTex('wall',96,96,(g,w,h)=>{g.fillStyle='#2e251d';g.fillRect(0,0,w,h);for(let y=0;y<h;y+=24)for(let x=(y/24%2)*-24;x<w;x+=48){g.fillStyle=(x+y)%96?'#49392d':'#392c23';g.fillRect(x+1,y+1,46,22);g.strokeStyle='rgba(0,0,0,.45)';g.strokeRect(x+1,y+1,46,22)}g.fillStyle='rgba(94,255,106,.08)';for(let i=0;i<10;i++)g.fillRect(rand(0,w),rand(0,h),rand(2,8),rand(10,28))});makeTex('door',96,96,(g,w,h)=>{g.fillStyle='#18120e';g.fillRect(0,0,w,h);g.fillStyle='#5a3f25';g.fillRect(14,0,68,h);g.fillStyle='#25180e';for(let y=8;y<h;y+=16)g.fillRect(18,y,60,4);g.fillStyle='#ffcf4a';g.fillRect(68,42,8,8)});makeTex('floor',160,160,(g,w,h)=>{g.fillStyle='#14100d';g.fillRect(0,0,w,h);for(let i=0;i<240;i++){g.fillStyle=`rgba(${55+Math.random()*60},${45+Math.random()*35},${35+Math.random()*25},.22)`;g.fillRect(rand(0,w),rand(0,h),rand(1,4),rand(1,4))}})}
  function spriteCell(index){return {sx:(index%4)*256,sy:Math.floor(index/4)*256,sw:256,sh:256}}
  function drawSpriteCell(g,index,x,y,w,h,alpha=1){
    if(sheetReady){
      const c=spriteCell(index); const pad=index<4?34:18;
      g.save(); g.globalAlpha=alpha;
      g.drawImage(sheet,c.sx+pad,c.sy+pad,c.sw-pad*2,c.sh-pad*2,x,y,w,h);
      g.restore();
    } else { drawFallbackSprite(g,index,x,y,w,h,alpha); }
  }
  function drawFallbackSprite(g,index,x,y,w,h,alpha=1){
    g.save();g.globalAlpha=alpha;
    if(index<4){
      const brute=index===2,crawler=index===1,armored=index===3;
      const skin=brute?'#8b6a4f':crawler?'#6f8f58':armored?'#7d8589':'#6ea35f';
      g.fillStyle='rgba(0,0,0,.35)';g.ellipse(x+w*.5,y+h*.96,w*.28,h*.045,0,0,Math.PI*2);g.fill();
      g.fillStyle=skin;g.beginPath();g.ellipse(x+w*.5,y+h*(crawler?.38:.22),w*(brute?.17:.13),h*(crawler?.11:.09),0,0,Math.PI*2);g.fill();
      g.fillStyle=armored?'#3a4044':'#3c2b24';g.fillRect(x+w*(brute?.33:.38),y+h*(crawler?.43:.33),w*(brute?.34:.25),h*(crawler?.30:.34));
      g.strokeStyle=skin;g.lineWidth=Math.max(3,w*.045);g.beginPath();g.moveTo(x+w*.39,y+h*(crawler?.47:.42));g.lineTo(x+w*.18,y+h*(crawler?.62:.54));g.moveTo(x+w*.61,y+h*(crawler?.47:.42));g.lineTo(x+w*.82,y+h*(crawler?.59:.50));g.stroke();
      g.strokeStyle=brute?'#5b3a2e':skin;g.beginPath();g.moveTo(x+w*.43,y+h*(crawler?.72:.66));g.lineTo(x+w*.35,y+h*.95);g.moveTo(x+w*.57,y+h*(crawler?.72:.66));g.lineTo(x+w*.65,y+h*.95);g.stroke();
      g.fillStyle='#ff4a3f';g.fillRect(x+w*.44,y+h*(crawler?.35:.20),w*.035,h*.018);g.fillRect(x+w*.53,y+h*(crawler?.35:.20),w*.035,h*.018);
    } else if(index>=4&&index<=7){
      const colors=['#2b2d31','#222831','#54351f','#303b34'],metal=['#c5c1aa','#95d9ff','#ffca86','#c6ff9d']; const k=index-4;
      g.translate(x+w*.08,y+h*.20);g.rotate(-.08);g.fillStyle='rgba(0,0,0,.45)';g.fillRect(w*.05,h*.48,w*.80,h*.12);g.fillStyle=colors[k];g.fillRect(w*.18,h*.32,w*.58,h*.16);g.fillStyle=metal[k];g.fillRect(w*.68,h*.35,w*.24,h*.07);g.fillStyle='#141414';g.fillRect(w*.36,h*.48,w*.12,h*.28);g.fillRect(w*.20,h*.43,w*.18,h*.10);if(index===6){g.fillStyle='#2a160d';g.fillRect(w*.52,h*.43,w*.34,h*.11)}
    } else {
      const colors=['#ff6565','#74c7ff','#ffcf4a','#63ff9f','#74c7ff','#fff','#ffcf4a','#ff884d'];g.fillStyle=colors[(index-8+colors.length)%colors.length];g.beginPath();g.arc(x+w*.5,y+h*.5,Math.min(w,h)*.32,0,Math.PI*2);g.fill();g.fillStyle='rgba(255,255,255,.35)';g.fillRect(x+w*.38,y+h*.18,w*.12,h*.52);
    }

  function resize(){const d=Math.min(devicePixelRatio||1,2);canvas.width=Math.floor(innerWidth*d);canvas.height=Math.floor(innerHeight*d);ctx.setTransform(d,0,0,d,0,0)} addEventListener('resize',resize,{passive:true}); resize(); makeAssets();
  function isDoorClosed(x,y){return doors.some(d=>!d.open&&Math.floor(x)===d.x&&Math.floor(y)===d.y)} function isWall(x,y){const ix=Math.floor(x),iy=Math.floor(y);return ix<0||iy<0||ix>=W||iy>=H||baseMap[iy][ix]===1||isDoorClosed(ix,iy)}
  function castRay(px,py,a){let sin=Math.sin(a),cos=Math.cos(a),d=0,lastX=px,lastY=py;while(d<22){d+=.035;const x=px+cos*d,y=py+sin*d;if(isWall(x,y)){return {d,x,y,type:isDoorClosed(x,y)?2:1,frac:Math.abs((Math.abs(x-lastX)>Math.abs(y-lastY)?y:x)%1)}}lastX=x;lastY=y}return {d:22,x:px+cos*22,y:py+sin*22,type:0,frac:0}}
  function hasLine(x1,y1,x2,y2){const steps=Math.ceil(dist(x1,y1,x2,y2)*12);for(let i=1;i<steps;i++){const t=i/steps;if(isWall(x1+(x2-x1)*t,y1+(y2-y1)*t))return false}return true}
function startGame(){
    unlockAudio();
    hud.center.style.display='none';
    state.running=true;
    state.paused=false;
    state.gameOver=false;
    state.gameStarted=true;
    Object.assign(state.player,{x:2.5,y:2.5,a:0,hp:125,maxHp:125,points:1200,kills:0,speed:2.75,alive:true});
    state.wave=0;
    state.timeAlive=0;
    state.waveState='between';
    state.waveTimer=1;
    state.zombiesToSpawn=0;
    state.spawnCooldown=0;

    state.powerups=[];
    state.floaters=[];
    state.particles=[];

    state.reloading=false;
    state.reloadTimer=0;
    state.lastShot=0;
    state.activePowers={insta:0,double:0};
    state.prompt=null;

    state.zombiesToSpawn=6;
    setTimeout(() => {
      hud.start.disabled=false;
      hud.start.textContent='START GAME';
      nextWave();
      updateHud();

  }

    const o=state.audio.createOscillator(),g=state.audio.createGain();o.type=type;o.frequency.value=freq;g.gain.value=gain;o.connect(g);g.connect(state.audio.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,state.audio.currentTime+dur);o.stop(state.audio.currentTime+dur)
  }

  }
