appId: com.prometheus.desktop
productName: Prometheus
copyright: "Prometheus Desktop"

# Icon — use .ico for proper Windows icon at all sizes
icon: assets/Prometheus.ico

# What to include in the packaged app
files:
  - electron/**/*
  - src/**/*
  - web-ui/**/*
  - assets/**/*
  - bin/**/*
  - scripts/**/*
  - node_modules/**/*
  - package.json
  - tsconfig.json
  # Exclude runtime/private/local state and release artifacts.
  - "!workspace/**/*"
  - "!.prometheus/**/*"
  - "!teams/**/*"
  - "!.claude/**/*"
  - "!.cursor/**/*"
  - "!.vscode/**/*"
  - "!.pip-cache/**/*"
  - "!.pip-tmp/**/*"
  - "!.tmp-py/**/*"
  - "!release/**/*"
  - "!release-public/**/*"
  - "!output/**/*"
  - "!tmp/**/*"
  - "!*.log"
  - "!*.docx"
  - "!*.zip"
  - "!*.mp4"
  - "!*.png"
  - "!eng.traineddata"
  - "!CIS.docx"
  - "!Prometheus_CIS_Plan.docx"
  - "!Prometheus_Teams_CIS_Master_Plan.docx"
  - "!prometheus_browser_intelligence.docx"
  - "!skills.zip"
  - "!Context.md"
  - "!PROPOSALS_ANALYSIS.md"
  - "!Prometheus_Teams_CIS_Master_Plan.md"
  - "!apply-local-llm-patch.js"
  - "!b5-server-v2.js"
  - "!write-chat-helpers.js"
  - "!patch-server-v2.js"
  - "!rebrand-html.js"
  - "!rebrand-src.js"
  - "!test-ollama.mjs"
  - "!check-build.bat"
  - "!start-gateway.bat"
  # Exclude heavy/unnecessary stuff
  - "!node_modules/.cache/**/*"
  - "!**/*.map"
  - "!dist/**/*"
  - "!.git/**/*"
  - "!**/*.log"

# Where to output the installer
directories:
  output: release

# Windows build
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/Prometheus.ico

# Installer options (NSIS = proper Windows installer)
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Prometheus
  installerIcon: assets/Prometheus.ico
  uninstallerIcon: assets/Prometheus.ico
  installerHeaderIcon: assets/Prometheus.ico
  deleteAppDataOnUninstall: false

# asar packaging — bundles source into a fast archive
# Disabled so tsx can resolve .ts files at runtime inside the app
asar: false
