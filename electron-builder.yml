appId: com.prometheus.desktop
productName: Prometheus
copyright: "Prometheus Desktop"

# Icon — use .ico for proper Windows icon at all sizes
icon: assets/Prometheus.ico

# What to include in the packaged app
files:
  - electron/**/*
  - src/**/*
  - web-ui/**/*
  - assets/**/*
  - extensions/prometheus-personal-chrome/**/*
  - bin/**/*
  - scripts/**/*
  - node_modules/**/*
  - package.json
  - tsconfig.json
  # Exclude runtime/private/local state and release artifacts.
  - "!workspace/**/*"
  - "!.prometheus/**/*"
  - "!teams/**/*"
  - "!.claude/**/*"
  - "!.cursor/**/*"
  - "!.vscode/**/*"
  - "!.pip-cache/**/*"
  - "!.pip-tmp/**/*"
  - "!.tmp-py/**/*"
  - "!release/**/*"
  - "!release-public/**/*"
  - "!output/**/*"
  - "!tmp/**/*"
  - "!*.log"
  - "!*.docx"
  - "!*.zip"
  - "!*.mp4"
  - "!*.png"
  - "!eng.traineddata"
  - "!CIS.docx"
  - "!Prometheus_CIS_Plan.docx"
  - "!Prometheus_Teams_CIS_Master_Plan.docx"
  - "!prometheus_browser_intelligence.docx"
  - "!skills.zip"
  - "!Context.md"
  - "!PROPOSALS_ANALYSIS.md"
  - "!Prometheus_Teams_CIS_Master_Plan.md"
  - "!apply-local-llm-patch.js"
  - "!b5-server-v2.js"
  - "!write-chat-helpers.js"
  - "!patch-server-v2.js"
  - "!rebrand-html.js"
  - "!rebrand-src.js"
  - "!test-ollama.mjs"
  - "!check-build.bat"
  - "!start-gateway.bat"
  # Exclude heavy/unnecessary stuff
  - "!node_modules/.cache/**/*"
  - "!**/*.map"
  - "!dist/**/*"
  - "!.git/**/*"
  - "!**/*.log"

# Where to output the installer
directories:
  output: release

# Windows build
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/Prometheus.ico

# macOS developer build. Production signing/notarization lives in
# electron-builder-public.yml and is intentionally required there.
mac:
  target:
    - dmg
    - zip
  icon: assets/Prometheus.icns
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  minimumSystemVersion: "11.0"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    NSMicrophoneUsageDescription: Prometheus uses the microphone when you start a voice conversation or dictation.
    NSCameraUsageDescription: Prometheus uses the camera only when you choose to capture or attach an image or video.
  extraResources:
    - from: "bin/prometheus-desktop-helper"
      to: "prometheus-desktop-helper"

# Installer options (NSIS = proper Windows installer)
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Prometheus
  installerIcon: assets/Prometheus.ico
  uninstallerIcon: assets/Prometheus.ico
  installerHeaderIcon: assets/Prometheus.ico
  deleteAppDataOnUninstall: false

# asar packaging — bundles source into a fast archive
# Disabled so tsx can resolve .ts files at runtime inside the app
asar: false

# Kept external even when a downstream build enables ASAR: Chrome's Load
# unpacked cannot read an extension from app.asar.
asarUnpack:
  - extensions/prometheus-personal-chrome/**/*
