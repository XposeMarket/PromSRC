in:0 0 24px;font-weight:760;letter-spacing:-.055em}.sub{font-size:25px;line-height:1.35;color:rgba(223,255,248,.68);max-width:570px}.panel{position:absolute;right:92px;top:86px;width:360px;border:1px solid rgba(94,234,212,.24);border-radius:28px;padding:26px;background:rgba(3,14,13,.56);box-shadow:0 0 60px rgba(94,234,212,.08),inset 0 0 30px rgba(94,234,212,.04);animation:panel .9s ease both 1s}.row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(94,234,212,.14);padding:13px 0;font-size:18px;color:rgba(223,255,248,.62)}.row b{font-size:20px;color:#dffff8}.cta{position:absolute;right:92px;bottom:86px;padding:22px 30px;border-radius:999px;background:rgba(94,234,212,.13);border:1px solid rgba(94,234,212,.45);font-size:22px;font-weight:750;box-shadow:0 0 34px rgba(94,234,212,.18);opacity:0;animation:up .8s ease both 5.05s,pulse 2.2s ease-in-out infinite 5.6s}.code{position:absolute;left:50%;bottom:62px;transform:translateX(-50%);font:18px ui-monospace,Menlo,monospace;color:rgba(185,255,242,.45);letter-spacing:.16em}.vignette{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,transparent 0 38%,rgba(0,0,0,.38) 68%,rgba(0,0,0,.82));pointer-events:none}@keyframes breath{50%{transform:scale(1.05);opacity:.9}}@keyframes scan{to{background-position:0 90px}}@keyframes drift{to{background-position:300px -180px, -240px 210px}}@keyframes rotateGrid{to{transform:translateX(-72px)}}@keyframes landShift{to{transform:rotate(360deg)}}@keyframes sweep{50%{transform:translateX(60px);opacity:.55}}@keyframes float{50%{transform:translateY(-12px) scale(1.015)}}@keyframes ring{to{transform:translate(-50%,-50%) rotateX(68deg) rotateZ(352deg)}}@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}@keyframes panel{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}@keyframes pulse{50%{transform:scale(1.035);box-shadow:0 0 72px rgba(94,234,212,.34)}}
