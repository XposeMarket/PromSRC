appId: com.prometheus.desktop
productName: Prometheus
copyright: "Prometheus Desktop"

# ── Update feed ──────────────────────────────────────────────────────────────
# Uses a separate *public* GitHub repo for releases so the source repo (PromSRC)
# can stay private. Users never need a GitHub token to receive updates.
# Set GH_TOKEN env var when running `npm run release` to publish.
publish:
  provider: github
  owner: XposeMarket
  repo: prometheus-releases
  private: false

icon: assets/Prometheus.ico

files:
  - electron/**/*
  - dist/**/*
  - generated/public-web-ui/**/*
  - assets/**/*
  - node_modules/**/*
  - runtime-dependencies.public.json
  - package.json
  - "!generated/public-web-ui/**/*.map"
  - "!generated/public-web-ui/**/*.log"
  - "!src/**/*"
  - "!web-ui/**/*"
  - "!workspace/**/*"
  - "!.prometheus/**/*"
  - "!teams/**/*"
  - "!scripts/**/*"
  - "!bin/**/*"
  - "!.claude/**/*"
  - "!.cursor/**/*"
  - "!.vscode/**/*"
  - "!.pip-cache/**/*"
  - "!.pip-tmp/**/*"
  - "!.tmp-py/**/*"
  - "!release/**/*"
  - "!release-public/**/*"
  - "!output/**/*"
  - "!tmp/**/*"
  - "!*.log"
  - "!*.docx"
  - "!*.zip"
  - "!*.mp4"
  - "!*.png"
  - "!eng.traineddata"
  - "!node_modules/.bin/**/*"
  - "!node_modules/@electron/**/*"
  - "!node_modules/@electron-builder/**/*"
  - "!node_modules/@types/**/*"
  - "!node_modules/@typescript-eslint/**/*"
  - "!node_modules/app-builder-bin/**/*"
  - "!node_modules/app-builder-lib/**/*"
  - "!node_modules/builder-util/**/*"
  - "!node_modules/builder-util-runtime/**/*"
  - "!node_modules/electron/**/*"
  - "!node_modules/electron-builder/**/*"
  - "!node_modules/eslint/**/*"
  - "!node_modules/eslint-*/**/*"
  - "!node_modules/tsx/**/*"
  - "!CIS.docx"
  - "!Prometheus_CIS_Plan.docx"
  - "!Prometheus_Teams_CIS_Master_Plan.docx"
  - "!prometheus_browser_intelligence.docx"
  - "!skills.zip"
  - "!Context.md"
  - "!PROPOSALS_ANALYSIS.md"
  - "!Prometheus_Teams_CIS_Master_Plan.md"
  - "!apply-local-llm-patch.js"
  - "!b5-server-v2.js"
  - "!write-chat-helpers.js"
  - "!patch-server-v2.js"
  - "!rebrand-html.js"
  - "!rebrand-src.js"
  - "!test-ollama.mjs"
  - "!check-build.bat"
  - "!start-gateway.bat"
  - "!dist/**/*.map"
  - "!dist/**/*.d.ts"
  - "!dist/**/*.d.ts.map"
  - "!dist/tools/self-repair.js"
  - "!dist/tools/self-update.js"
  - "!dist/tools/source-access.js"
  - "!node_modules/.cache/**/*"
  - "!node_modules/playwright-core/.local-browsers/**/*"
  - "!node_modules/playwright/.local-browsers/**/*"
  - "!node_modules/gif.js/site/**/*"
  - "!.git/**/*"
  - "!**/*.log"

extraMetadata:
  prometheusBuild: public

directories:
  output: release-public

afterPack: scripts/stamp-windows-icon.js

# Lock the installer filename so the local artifact matches the URL recorded
# in latest.yml (electron-builder hyphenates spaces when publishing). Keeping
# both sides identical lets the auto-updater find the file whether it's served
# from GitHub Releases or a local folder during QA.
artifactName: ${productName}-Setup-${version}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/Prometheus.ico
  verifyUpdateCodeSignature: false
  # Disabled to avoid electron-builder's winCodeSign symlink extraction failure
  # on normal Windows shells. The afterPack hook stamps Prometheus.ico into the
  # exe directly with rcedit so shell/taskbar icons do not fall back to Electron.
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Prometheus
  installerIcon: assets/Prometheus.ico
  uninstallerIcon: assets/Prometheus.ico
  installerHeaderIcon: assets/Prometheus.ico
  # Never touch %APPDATA%\Prometheus — user data (vault, config, workspace) lives there.
  # The installer detects existing installations via the Windows registry and upgrades
  # in place — no manual uninstall needed between versions.
  deleteAppDataOnUninstall: false

asar: true

# Native .node modules cannot be loaded from inside an asar archive.
# These must be unpacked so Node can require() them from the real filesystem.
asarUnpack:
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/node-pty/**/*"
  - "node_modules/onnxruntime-node/**/*"
  - "node_modules/@ffmpeg-installer/**/*"
  - "node_modules/@ffprobe-installer/**/*"

extraResources:
  - from: "bin/prometheus-desktop-helper.exe"
    to: "prometheus-desktop-helper.exe"
  - from: "generated/bundled-skills"
    to: "bundled-skills"
    filter:
      - "**/*"
  - from: "node_modules/playwright-core/.local-browsers"
    to: "playwright-browsers"
    filter:
      - "**/*"
